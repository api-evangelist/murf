description: >-
  Murf API uses pay-as-you-go pricing with a flat $0.01/minute rate for Falcon TTS (no
  tiered confusion) plus Gen 2 TTS, Dubbing, Voice Changer, Translation, and Voice Isolator
  endpoints. Free trial API key available; Enterprise contracts negotiated.
notes: Reconciled from public Murf API page (May 2026); per-minute rate is for Falcon TTS streaming.
sources:
- https://murf.ai/api
- https://murf.ai/api/pricing
plans:
- id: murf-payg
  name: Pay-as-you-go
  type: usage
  description: Per-minute Falcon TTS streaming with flat rate; other endpoints priced separately.
  entries:
  - label: Falcon TTS Streaming
    name: falcon_tts
    type: per_minute
    metric: minute
    limit: -1
    timeFrame: usage
    geo: global
    unit: 1
    price: 0.01 USD/min
    userMultiplied: false
  - label: Gen 2 TTS
    name: gen2_tts
    type: per_unit
    metric: minute
    limit: -1
    timeFrame: usage
    geo: global
    unit: 1
    price: see API pricing page (per character / per minute)
    userMultiplied: false
  - label: Dubbing API
    name: dubbing
    type: per_unit
    metric: minute
    limit: -1
    timeFrame: usage
    geo: global
    unit: 1
    price: see API pricing page
    userMultiplied: false
  - label: Voice Changer API
    name: voice_changer
    type: per_unit
    metric: minute
    limit: -1
    timeFrame: usage
    geo: global
    unit: 1
    price: see API pricing page
    userMultiplied: false
  - label: Translation API
    name: translation
    type: per_unit
    metric: minute
    limit: -1
    timeFrame: usage
    geo: global
    unit: 1
    price: see API pricing page
    userMultiplied: false
- id: murf-free-trial
  name: Free Trial API Key
  type: free
  description: Free API key for testing.
  entries:
  - label: Free Trial
    name: free_trial
    type: flat
    metric: trial
    limit: 1
    timeFrame: trial
    geo: global
    unit: 1
