meters:
- name: falcon_tts_minutes
  description: Falcon TTS streaming minutes at $0.01/min flat.
  unit: minute
  aggregation: sum
  dimensions:
  - account
  - region
- name: gen2_tts_usage
  description: Gen 2 TTS studio synthesis usage.
  unit: minute
  aggregation: sum
  dimensions:
  - account
  - voice
- name: dubbing_minutes
  description: Dubbing API minutes processed.
  unit: minute
  aggregation: sum
  dimensions:
  - account
  - target_language
- name: voice_changer_minutes
  description: Voice Changer API minutes processed.
  unit: minute
  aggregation: sum
  dimensions:
  - account
- name: translation_units
  description: Translation API usage.
  unit: word
  aggregation: sum
  dimensions:
  - account
  - target_language
principles:
- name: Visibility
  description: Track per-endpoint usage in Murf API dashboard.
- name: Allocation
  description: Tag voices and integrations per consuming product.
- name: Optimization
  description: Falcon flat rate suits high-volume voice agents; reserve Gen 2 for studio quality where needed.
- name: Accountability
  description: Assign owners per product (TTS, Dubbing, Voice Changer, Translation).
