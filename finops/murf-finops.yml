description: >-
  FOCUS-aligned FinOps view of Murf. Falcon TTS streams at a flat $0.01/min with no tiered
  confusion. Other endpoints (Gen 2 TTS, Dubbing, Voice Changer, Translation) priced per the
  API pricing page. Murf positions itself as up to 50% cheaper than competitor stacks.
notes: Falcon flat rate makes per-minute budgeting trivial; other endpoints require per-product cost tracking.
