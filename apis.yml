description: Murf is an AI voice generation platform offering studio-quality voiceovers in 20+ languages with 130+ voices.
  Public APIs include Falcon TTS (ultra-fast streaming), Text-to-Speech Gen 2 (studio quality), Dubbing, Voice Changer, Translation,
  and Voice Isolator. The Murf API is REST-based at https://api.murf.ai with regional alternatives (us-east, us-west, in,
  global). OpenAPI 3.1 published.
