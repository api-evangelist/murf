naftiko: 1.0.0-alpha2
info:
  label: API Reference — subpackage_textToSpeech
  description: 'API Reference — subpackage_textToSpeech. 3 operations. Lead operation: Synthesize Speech. Self-contained Naftiko
    capability covering one Murf business surface.'
  tags:
  - Murf
  - subpackage_textToSpeech
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MURF_API_KEY: MURF_API_KEY
capability:
  consumes:
  - type: http
    namespace: murf-subpackage-texttospeech
    baseUri: https://api.murf.ai
    description: API Reference — subpackage_textToSpeech business capability. Self-contained, no shared references.
    resources:
    - name: v1-speech-generate
      path: /v1/speech/generate
      operations:
      - name: generate
        method: POST
        description: Synthesize Speech
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: api-key
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-speech-stream
      path: /v1/speech/stream
      operations:
      - name: stream
        method: POST
        description: Stream Speech
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: api-key
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-speech-voices
      path: /v1/speech/voices
      operations:
      - name: getvoices
        method: GET
        description: List Voices
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: model
          in: query
          type: string
          description: 'Valid values: FALCON, GEN2'
        - name: token
          in: header
          type: string
        - name: api-key
          in: header
          type: string
  exposes:
  - type: rest
    namespace: murf-subpackage-texttospeech-rest
    port: 8080
    description: REST adapter for API Reference — subpackage_textToSpeech. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/speech/generate
      name: v1-speech-generate
      description: REST surface for v1-speech-generate.
      operations:
      - method: POST
        name: generate
        description: Synthesize Speech
        call: murf-subpackage-texttospeech.generate
        with:
          api-key: rest.api-key
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/speech/stream
      name: v1-speech-stream
      description: REST surface for v1-speech-stream.
      operations:
      - method: POST
        name: stream
        description: Stream Speech
        call: murf-subpackage-texttospeech.stream
        with:
          api-key: rest.api-key
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/speech/voices
      name: v1-speech-voices
      description: REST surface for v1-speech-voices.
      operations:
      - method: GET
        name: getvoices
        description: List Voices
        call: murf-subpackage-texttospeech.getvoices
        with:
          model: rest.model
          token: rest.token
          api-key: rest.api-key
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: murf-subpackage-texttospeech-mcp
    port: 9090
    transport: http
    description: MCP adapter for API Reference — subpackage_textToSpeech. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: synthesize-speech
      description: Synthesize Speech
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: murf-subpackage-texttospeech.generate
      with:
        api-key: tools.api-key
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stream-speech
      description: Stream Speech
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: murf-subpackage-texttospeech.stream
      with:
        api-key: tools.api-key
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: list-voices
      description: List Voices
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: murf-subpackage-texttospeech.getvoices
      with:
        model: tools.model
        token: tools.token
        api-key: tools.api-key
      outputParameters:
      - type: object
        mapping: $.
